name: Build and deploy book

on:
  push:
    branches: main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install TinyTeX
        run: quarto install tinytex

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev libgmp-dev

      - name: Install R dependencies
        run: |
          install.packages(c(
            "rmarkdown", "knitr",
            "here", "palmerpenguins", "tibble", "dplyr", "tidyr",
            "purrr", "stringr", "forcats", "lubridate", "readr",
            "readxl", "ggplot2", "rlang", "magrittr", "arrow",
            "duckdb", "DBI", "data.table", "targets", "memoise",
            "future.apply", "S7", "lobstr", "checkmate", "sloop",
            "writexl", "bench"
          ))
        shell: Rscript {0}

      - name: Render book
        run: quarto render

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _book

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
