<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" font-family="'Courier New', monospace">
  <style>
    text { font-size: 17px; fill: #111; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 20px; font-weight: bold; }
    .sub { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; fill: #555; font-style: italic; }
    .step { font-size: 15px; }
    .nt { font-size: 16px; text-anchor: middle; }
    .expr { font-size: 18px; text-anchor: middle; }
    .bold { font-weight: bold; }
    rect.cell { fill: none; stroke: #111; stroke-width: 1.2; }
    circle.node { fill: none; stroke: #111; stroke-width: 1.2; }
    .div { stroke: #bbb; stroke-width: 0.8; stroke-dasharray: 5,5; }
    .sn { font-size: 13px; fill: #999; }
  </style>

  <!-- Divider -->
  <line x1="250" y1="10" x2="250" y2="370" class="div"/>

  <!-- LEFT: Turing machine -->
  <text x="125" y="34" class="title" text-anchor="middle">Turing machine</text>

  <!-- Tape: 6 cells at y=55, each 36×36 -->
  <g transform="translate(17,55)">
    <rect class="cell" x="0"   y="0" width="36" height="36"/>
    <rect class="cell" x="36"  y="0" width="36" height="36"/>
    <rect class="cell" x="72"  y="0" width="36" height="36"/>
    <rect class="cell" x="108" y="0" width="36" height="36"/>
    <rect class="cell" x="144" y="0" width="36" height="36"/>
    <rect class="cell" x="180" y="0" width="36" height="36"/>
    <text x="18"  y="23" class="nt" fill="#999" font-size="14px">…</text>
    <text x="54"  y="23" class="nt bold" font-size="14px">2</text>
    <text x="90"  y="23" class="nt bold" font-size="14px">3</text>
    <text x="126" y="23" class="nt bold" font-size="14px">5</text>
    <text x="162" y="23" class="nt" font-size="14px">0</text>
    <text x="198" y="23" class="nt" fill="#999" font-size="14px">…</text>
  </g>

  <!-- Head -->
  <line x1="71" y1="91" x2="71" y2="101" stroke="#111" stroke-width="1.2"/>
  <polygon points="71,111 66,101 76,101" fill="#111"/>
  <text x="71" y="128" font-size="13px" text-anchor="middle" font-family="Helvetica, sans-serif" fill="#555">head</text>

  <!-- Steps -->
  <g font-size="14px">
    <text x="30" y="156" class="step"><tspan class="sn">1. </tspan><tspan font-weight="bold">READ  </tspan> tape[1] → 2</text>
    <text x="30" y="180" class="step"><tspan class="sn">2. </tspan><tspan font-weight="bold">READ  </tspan> tape[2] → 3</text>
    <text x="30" y="204" class="step"><tspan class="sn">3. </tspan><tspan font-weight="bold">ADD   </tspan> 2 + 3 → 5</text>
    <text x="30" y="228" class="step"><tspan class="sn">4. </tspan><tspan font-weight="bold">WRITE </tspan> tape[3] ← 5</text>
    <text x="30" y="252" class="step"><tspan class="sn">5. </tspan><tspan font-weight="bold">HALT  </tspan> answer = 5</text>
  </g>

  <text x="125" y="330" class="sub" text-anchor="middle">Mutate state step by step</text>

  <!-- RIGHT: Lambda calculus -->
  <text x="375" y="34" class="title" text-anchor="middle">Lambda calculus</text>

  <!-- Tree edges -->
  <line x1="375" y1="104" x2="310" y2="132" stroke="#111" stroke-width="1.2"/>
  <line x1="375" y1="104" x2="375" y2="132" stroke="#111" stroke-width="1.2"/>
  <line x1="375" y1="104" x2="440" y2="132" stroke="#111" stroke-width="1.2"/>

  <!-- Nodes -->
  <circle class="node" cx="375" cy="74" r="30"/>
  <text x="375" y="79" class="nt" font-size="13px">apply</text>

  <circle class="node" cx="310" cy="152" r="20"/>
  <text x="310" y="159" class="nt bold" font-size="20px">+</text>

  <circle class="node" cx="375" cy="152" r="20"/>
  <text x="375" y="158" class="nt bold">2</text>

  <circle class="node" cx="440" cy="152" r="20"/>
  <text x="440" y="158" class="nt bold">3</text>

  <!-- Reduction 1 -->
  <line x1="375" y1="172" x2="375" y2="195" stroke="#111" stroke-width="1.2"/>
  <polygon points="375,205 370,195 380,195" fill="#111"/>

  <text x="375" y="230" class="expr">(+ 2 3)</text>

  <!-- Reduction 2 -->
  <line x1="375" y1="240" x2="375" y2="263" stroke="#111" stroke-width="1.2"/>
  <polygon points="375,273 370,263 380,263" fill="#111"/>

  <text x="375" y="300" class="expr bold" font-size="24px">5</text>

  <text x="375" y="330" class="sub" text-anchor="middle">Reduce expression to value</text>
</svg>
